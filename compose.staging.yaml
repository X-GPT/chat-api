services:
  chat-api:
    container_name: ${REPO_NAME}-staging-api
    image: ${API_IMAGE}
    restart: unless-stopped
    env_file:
      - /etc/mymemo/chat-api/env.staging
    environment:
      - NODE_ENV=production
    ports:
      - "${HOST_PORT}:${CONTAINER_PORT}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    mem_limit: 2g
    mem_reservation: 1536m
    memswap_limit: 2g
    logging:
      driver: awslogs
      options:
        awslogs-region: us-west-2
        awslogs-group: /apps/chat-api-staging
        awslogs-stream: ec2-${REPO_NAME}-staging-api
        awslogs-create-group: "true"
    networks:
      - mymemo-staging-network

networks:
  mymemo-staging-network:
    driver: bridge
